# Render Blueprint for neet-adaptive. See README.md's "Deployment (Render)" section for the
# manual dashboard equivalent and one-time post-deploy setup (taxonomy seeding, optional warmup).
services:
  - type: web
    name: neet-adaptive
    env: python
    # Free tier: no persistent disk, so DB_PATH/LLM_CALL_LOG_PATH fall back to config.py's local
    # defaults - all sessions/questions/reports are wiped on every restart, redeploy, or cold
    # start after inactivity. Fine for a demo, not for real use. To get real persistence back:
    # plan: starter, re-add a disk: block below, and point DB_PATH/LLM_CALL_LOG_PATH at its mount.
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    numInstances: 1 # do not autoscale - the app keeps in-memory state and uses a single SQLite file
    envVars:
      - key: OLLAMA_HOST
        value: https://ollama.com
      - key: OLLAMA_API_KEY
        sync: false # set manually in the Render dashboard - do not commit real keys here
      - key: OLLAMA_MODEL
        value: gpt-oss:120b
      - key: TAXONOMY_PATH
        value: ./data/taxonomy.json
      - key: GENERATOR_BATCH_SIZE
        value: "3"
      - key: POOL_QUESTIONS_PER_CONCEPT
        value: "10"
      - key: QUESTIONS_PER_SESSION
        value: "10"
